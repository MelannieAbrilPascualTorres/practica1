<!DOCTYPE html>
<html lang="es-mx">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Gestor de tareas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos.css') }}">
</head>

<body>
    <div class="container-fluid">
        <header class="row pt-5">
            <nav class="navbar nav1 navbar-expand-lg fixed-top">
                <div class="container-fluid">
                    <a class="navbar-brand text-light d-flex align-items-center" href="#">
                        Gestor de tareas
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                        aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    {% if session.get('logueado') %}
                    <div class="collapse navbar-collapse" id="navbarNavDropdown">
                        <ul class="navbar-nav w-100">
                            <li class="nav-item">
                                <a class="nav-link text-light" href="http://127.0.0.1:5000/inicio">Tareas</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-light" href="{{ url_for('logout') }}">Cerrar Sesión</a>
                            </li>
                            <li class="nav-item ms-auto">
                                <span class="nav-link text-light">
                                    Hola, {{ session.get('usuario') }}
                                </span>
                            </li>
                            {% endif %}
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            {% block contenido %}
            {% endblock %}
        </main>

        <footer class="nav1 ow text-light text-center py-4 mt-5">
            <div class="col-12">
                <h6>@Todos los derechos reservados 2025</h6>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
