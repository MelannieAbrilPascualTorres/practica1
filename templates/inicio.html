{% extends "base.html" %}

{% block titulo %}Tareas{% endblock %}

{% block contenido %}

<section class="container pt-4">
    <div class="card card-2 card-2 mb-3">
        <div class="card-header">Agregar tareas</div>
        <div class="card-body">
            <div class="row mt-3 align-items-center">
                <div class="col-md-10">
                    <input type="text" class="form-control" placeholder="Escribe tu tarea">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-j1 w-100">Crear</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card card-3 mb-3">
        <div class="card-header">Lista de tareas</div>
        <div class="card-body">
            <h6 class="card-title">Tus tareas</h6>
            <table class="table">
                <thead>
                    <tr>
                        <th scope="col">Fecha</th>
                        <th scope="col">Tarea</th>
                        <th scope="col">Estado</th>
                        <th scope="col">Opciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="text-center text-muted py-5">
                            No has agregado ninguna tarea<br>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

{% endblock %}
